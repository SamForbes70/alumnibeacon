services:
  - type: web
    name: alumnibeacon
    runtime: docker
    plan: starter
    healthCheckPath: /actuator/health
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: API_KEY_OPENROUTER
        sync: false
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: AUGUST_ADAPTER_URL
        value: http://localhost:8000
      - key: DATA_DIR
        value: /app/data
      - key: PORT
        value: 8080
    disk:
      name: alumnibeacon-data
      mountPath: /app/data
      sizeGB: 1
