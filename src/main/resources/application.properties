# Server
server.port=8080
spring.application.name=alumnibeacon

# SQLite Database
spring.datasource.url=jdbc:sqlite:${DATA_DIR:/app/data}/osint.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
jwt.secret=${JWT_SECRET:alumnibeacon-dev-secret-change-in-production-min-32-chars}
jwt.expiration=86400000

# August OSINT Adapter
august.adapter.url=${AUGUST_ADAPTER_URL:http://localhost:8000}
august.adapter.timeout=120000

# Scheduling
spring.task.scheduling.pool.size=2

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Logging
logging.level.com.alumnibeacon=INFO
logging.level.org.springframework.security=WARN

# Allow PRAGMA (non-transactional) mixed with DDL in same migration
spring.flyway.mixed=true

# SQLite datetime compatibility
spring.jpa.properties.hibernate.type.preferred_instant_jdbc_type=VARCHAR
