# Server
server.port=8080
spring.application.name=alumnibeacon

# SQLite Database
spring.datasource.url=jdbc:sqlite:${DATA_DIR:/app/data}/osint.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
jwt.secret=${JWT_SECRET:alumnibeacon-dev-secret-change-in-production-min-32-chars}
jwt.expiration=86400000

# August OSINT Adapter
august.adapter.url=${AUGUST_ADAPTER_URL:http://localhost:8000}
august.adapter.timeout=120000

# OSINT Engine routing: python | agent-zero | hybrid
# python      = fast deterministic pipeline (~60s)
# agent-zero  = adaptive AI investigator (~15min, requires Agent Zero running)
# hybrid      = agent-zero primary, python fallback on failure
osint.engine=${OSINT_ENGINE:python}

# Agent Zero A2A configuration
agent-zero.url=${AGENT_ZERO_URL:http://localhost}
agent-zero.timeout=900000

# Scheduling
spring.task.scheduling.pool.size=2

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Logging
logging.level.com.alumnibeacon=INFO
logging.level.org.springframework.security=WARN

# Allow PRAGMA (non-transactional) mixed with DDL in same migration
spring.flyway.mixed=true

# SQLite datetime compatibility
spring.jpa.properties.hibernate.type.preferred_instant_jdbc_type=VARCHAR

# ─────────────────────────────────────────────────────────────
# Email / SMTP  (P4 — Email Notifications)
# ─────────────────────────────────────────────────────────────
# Set mail.enabled=true and configure SMTP to send real emails.
# When false (default) emails are logged to console only.
mail.enabled=${MAIL_ENABLED:false}
mail.from=${MAIL_FROM:noreply@alumnibeacon.com}
mail.from-name=${MAIL_FROM_NAME:AlumniBeacon}

# SMTP provider — works with Gmail, SendGrid, Mailgun, AWS SES
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Application base URL (used in email links)
app.base-url=${APP_BASE_URL:http://localhost:8080}
