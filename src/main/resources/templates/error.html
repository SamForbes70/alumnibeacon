<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error | AlumniBeacon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{beacon:{charcoal:'#1C2526',magenta:'#9C2A6B',gold:'#C9A66B',cream:'#F8F1E9'}}}}}</script>
</head>
<body class="bg-beacon-charcoal min-h-screen flex items-center justify-center">
<div class="w-full max-w-lg text-center">
    <div class="w-16 h-16 bg-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
        <span class="text-white font-bold text-2xl">!</span>
    </div>
    <h1 class="text-3xl font-bold text-beacon-gold mb-2">Something went wrong</h1>
    <p class="text-gray-400 mb-6" th:text="${requestUri}">Unknown path</p>
    <div class="bg-red-900 border border-red-700 rounded-lg p-4 mb-6 text-left">
        <p class="text-red-300 text-sm font-mono" th:text="${errorType + ': ' + errorMessage}">Error details</p>
    </div>
    <a href="/dashboard" class="bg-beacon-magenta text-white px-6 py-2.5 rounded-lg hover:bg-pink-800 transition-colors">
        Back to Dashboard
    </a>
</div>
</body>
</html>
