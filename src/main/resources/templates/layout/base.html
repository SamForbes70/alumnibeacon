<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' | AlumniBeacon'">AlumniBeacon</title>
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        beacon: {
                            charcoal: '#1C2526',
                            magenta: '#9C2A6B',
                            gold: '#C9A66B',
                            cream: '#F8F1E9',
                            'river-blue': '#4A7C9D',
                            'deep-green': '#2E5F4A',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F8F1E9; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .sidebar-link.active { background-color: rgba(156, 42, 107, 0.15); border-left: 3px solid #9C2A6B; }
    </style>
</head>
<body class="bg-beacon-cream min-h-screen">

<!-- Sidebar + Main Layout -->
<div class="flex min-h-screen">
    <!-- Sidebar -->
    <aside class="w-64 bg-beacon-charcoal text-white flex flex-col fixed h-full z-10">
        <!-- Logo -->
        <div class="p-6 border-b border-gray-700">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-beacon-gold rounded-full flex items-center justify-center">
                    <span class="text-beacon-charcoal font-bold text-sm">AB</span>
                </div>
                <div>
                    <h1 class="font-serif text-lg font-semibold text-beacon-gold">AlumniBeacon</h1>
                    <p class="text-xs text-gray-400">OSINT Gateway</p>
                </div>
            </div>
        </div>

        <!-- Nav -->
        <nav class="flex-1 p-4 space-y-1">
            <a th:href="@{/dashboard}" class="sidebar-link flex items-center gap-3 px-3 py-2 rounded text-gray-300 hover:text-white hover:bg-gray-700 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7h18M3 12h18M3 17h18"/></svg>
                Dashboard
            </a>
            <a th:href="@{/investigations}" class="sidebar-link flex items-center gap-3 px-3 py-2 rounded text-gray-300 hover:text-white hover:bg-gray-700 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                Investigations
            </a>
            <a th:href="@{/investigations/new}" class="sidebar-link flex items-center gap-3 px-3 py-2 rounded text-gray-300 hover:text-white hover:bg-gray-700 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                New Search
            </a>
        </nav>

        <!-- User info -->
        <div class="p-4 border-t border-gray-700">
            <div class="flex items-center justify-between">
                <span class="text-xs text-gray-400" sec:authentication="name">User</span>
                <a th:href="@{/logout}" class="text-xs text-beacon-magenta hover:text-pink-300">Sign out</a>
            </div>
        </div>
    </aside>

    <!-- Main content -->
    <main class="ml-64 flex-1 p-8">
        <div th:replace="~{::content}"></div>
    </main>
</div>

</body>
</html>
