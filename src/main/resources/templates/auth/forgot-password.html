<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Forgot Password — AlumniBeacon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%); min-height: 100vh; }
        .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6, #1d4ed8); transition: all 0.2s; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(59,130,246,0.4); }
        .input-field { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); color: white; }
        .input-field:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }
        .input-field::placeholder { color: rgba(255,255,255,0.35); }
    </style>
</head>
<body class="flex items-center justify-center p-4">

<div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-8">
        <div class="inline-flex items-center gap-3 mb-4">
            <div class="w-10 h-10 rounded-xl bg-blue-500 flex items-center justify-center">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
            </div>
            <span class="text-2xl font-bold text-white">AlumniBeacon</span>
        </div>
        <h1 class="text-xl font-semibold text-white">Reset your password</h1>
        <p class="text-slate-400 text-sm mt-1">Enter your email and we'll send you a reset link</p>
    </div>

    <div class="card rounded-2xl p-8">

        <!-- Success state -->
        <div th:if="${submitted}" class="text-center">
            <div class="w-16 h-16 rounded-full bg-green-500/20 flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
            </div>
            <h2 class="text-white font-semibold text-lg mb-2">Check your email</h2>
            <p class="text-slate-400 text-sm mb-6">
                If <span class="text-blue-400" th:text="${email}"></span> is registered,
                you'll receive a password reset link shortly.
            </p>

            <!-- DEV MODE: show reset link on screen until P4 email is wired -->
            <div th:if="${devResetUrl}" class="mt-4 p-4 rounded-xl bg-yellow-500/10 border border-yellow-500/30 text-left">
                <p class="text-yellow-400 text-xs font-semibold mb-2">⚠️ DEV MODE — Reset link (remove in production):</p>
                <a th:href="${devResetUrl}" class="text-blue-400 text-xs break-all hover:underline"
                   th:text="${devResetUrl}"></a>
            </div>

            <a href="/login" class="mt-6 inline-block text-sm text-blue-400 hover:text-blue-300">
                ← Back to sign in
            </a>
        </div>

        <!-- Form state -->
        <form th:unless="${submitted}" method="post" action="/forgot-password">

            <div class="mb-5">
                <label class="block text-sm font-medium text-slate-300 mb-2">Email address</label>
                <input type="email" name="email" required autocomplete="email"
                       placeholder="you@university.edu.au"
                       class="input-field w-full px-4 py-3 rounded-xl text-sm"/>
            </div>

            <button type="submit"
                    class="btn-primary w-full py-3 rounded-xl text-white font-semibold text-sm">
                Send Reset Link
            </button>

            <div class="mt-6 text-center">
                <a href="/login" class="text-sm text-slate-400 hover:text-slate-300">
                    ← Back to sign in
                </a>
            </div>
        </form>

    </div>
</div>

</body>
</html>
