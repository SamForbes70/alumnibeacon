<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Reset Password — AlumniBeacon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%); min-height: 100vh; }
        .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6, #1d4ed8); transition: all 0.2s; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(59,130,246,0.4); }
        .input-field { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); color: white; }
        .input-field:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }
        .input-field::placeholder { color: rgba(255,255,255,0.35); }
    </style>
</head>
<body class="flex items-center justify-center p-4">

<div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-8">
        <div class="inline-flex items-center gap-3 mb-4">
            <div class="w-10 h-10 rounded-xl bg-blue-500 flex items-center justify-center">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
                </svg>
            </div>
            <span class="text-2xl font-bold text-white">AlumniBeacon</span>
        </div>
        <h1 class="text-xl font-semibold text-white">Set a new password</h1>
        <p class="text-slate-400 text-sm mt-1">Choose a strong password for your account</p>
    </div>

    <div class="card rounded-2xl p-8">

        <!-- Error state (invalid/expired token, or no token) -->
        <div th:if="${error != null and token == null}" class="text-center">
            <div class="w-16 h-16 rounded-full bg-red-500/20 flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </div>
            <h2 class="text-white font-semibold text-lg mb-2">Link invalid or expired</h2>
            <p class="text-slate-400 text-sm mb-6" th:text="${error}"></p>
            <a href="/forgot-password"
               class="btn-primary inline-block px-6 py-3 rounded-xl text-white font-semibold text-sm">
                Request a new link
            </a>
        </div>

        <!-- Reset form (valid token present) -->
        <form th:if="${token != null}" method="post" action="/reset-password" id="resetForm">
            <input type="hidden" name="token" th:value="${token}"/>

            <!-- Inline error -->
            <div th:if="${error}"
                 class="mb-5 p-3 rounded-xl bg-red-500/10 border border-red-500/30 text-red-400 text-sm"
                 th:text="${error}"></div>

            <div class="mb-5">
                <label class="block text-sm font-medium text-slate-300 mb-2">New password</label>
                <input type="password" name="password" id="password" required
                       minlength="8" autocomplete="new-password"
                       placeholder="At least 8 characters"
                       class="input-field w-full px-4 py-3 rounded-xl text-sm"/>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-slate-300 mb-2">Confirm new password</label>
                <input type="password" name="confirmPassword" id="confirmPassword" required
                       minlength="8" autocomplete="new-password"
                       placeholder="Repeat your new password"
                       class="input-field w-full px-4 py-3 rounded-xl text-sm"/>
                <p id="matchError" class="text-red-400 text-xs mt-1 hidden">Passwords do not match</p>
            </div>

            <!-- Password strength hint -->
            <div class="mb-5 p-3 rounded-xl bg-blue-500/10 border border-blue-500/20">
                <p class="text-blue-300 text-xs">💡 Use at least 8 characters with a mix of letters, numbers, and symbols.</p>
            </div>

            <button type="submit" id="submitBtn"
                    class="btn-primary w-full py-3 rounded-xl text-white font-semibold text-sm">
                Set New Password
            </button>

            <div class="mt-6 text-center">
                <a href="/login" class="text-sm text-slate-400 hover:text-slate-300">
                    ← Back to sign in
                </a>
            </div>
        </form>

    </div>
</div>

<script>
    // Client-side password match validation
    const pwd  = document.getElementById('password');
    const conf = document.getElementById('confirmPassword');
    const err  = document.getElementById('matchError');
    const btn  = document.getElementById('submitBtn');

    function checkMatch() {
        if (conf && conf.value && pwd && pwd.value !== conf.value) {
            err && err.classList.remove('hidden');
            btn && btn.setAttribute('disabled', 'disabled');
            btn && (btn.style.opacity = '0.5');
        } else {
            err && err.classList.add('hidden');
            btn && btn.removeAttribute('disabled');
            btn && (btn.style.opacity = '1');
        }
    }

    pwd  && pwd.addEventListener('input', checkMatch);
    conf && conf.addEventListener('input', checkMatch);
</script>

</body>
</html>
