<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register | AlumniBeacon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{beacon:{charcoal:'#1C2526',magenta:'#9C2A6B',gold:'#C9A66B',cream:'#F8F1E9'}}}}}</script>
    <style>@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');body{font-family:'Inter',sans-serif}.font-serif{font-family:'Playfair Display',serif}</style>
</head>
<body class="bg-beacon-charcoal min-h-screen flex items-center justify-center py-8">
<div class="w-full max-w-md">
    <div class="text-center mb-8">
        <div class="w-16 h-16 bg-beacon-gold rounded-full flex items-center justify-center mx-auto mb-4">
            <span class="text-beacon-charcoal font-bold text-2xl">AB</span>
        </div>
        <h1 class="font-serif text-3xl text-beacon-gold">AlumniBeacon</h1>
    </div>
    <div class="bg-white rounded-2xl shadow-2xl p-8">
        <h2 class="font-serif text-2xl text-beacon-charcoal mb-6">Create Account</h2>
        <div th:if="${error}" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4 text-sm" th:text="${error}"></div>
        <form th:action="@{/auth/register}" method="post" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Organisation Name</label>
                <input type="text" name="organisationName" required
                       class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-beacon-magenta outline-none"
                       placeholder="St. Mary's Anglican School">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Your Full Name</label>
                <input type="text" name="fullName" required
                       class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-beacon-magenta outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" required
                       class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-beacon-magenta outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required minlength="8"
                       class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-beacon-magenta outline-none">
                <p class="text-xs text-gray-400 mt-1">Minimum 8 characters</p>
            </div>
            <button type="submit"
                    class="w-full bg-beacon-magenta text-white py-2.5 rounded-lg font-medium hover:bg-pink-800 transition-colors">
                Create Account
            </button>
        </form>
        <p class="text-center text-sm text-gray-500 mt-6">
            Already have an account? <a th:href="@{/login}" class="text-beacon-magenta hover:underline">Sign in</a>
        </p>
    </div>
</div>
</body>
</html>
