<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | AlumniBeacon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{beacon:{charcoal:'#1C2526',magenta:'#9C2A6B',gold:'#C9A66B',cream:'#F8F1E9'}}}}}</script>
    <style>@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');body{font-family:'Inter',sans-serif}.font-serif{font-family:'Playfair Display',serif}</style>
</head>
<body class="bg-beacon-charcoal min-h-screen flex items-center justify-center">
<div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
        <div class="w-16 h-16 bg-beacon-gold rounded-full flex items-center justify-center mx-auto mb-4">
            <span class="text-beacon-charcoal font-bold text-2xl">AB</span>
        </div>
        <h1 class="font-serif text-3xl text-beacon-gold">AlumniBeacon</h1>
        <p class="text-gray-400 mt-1 text-sm">Rediscovering Connections with Integrity</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
        <h2 class="font-serif text-2xl text-beacon-charcoal mb-6">Sign In</h2>

        <!-- Error -->
        <div th:if="${error}" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4 text-sm" th:text="${error}"></div>
        <div th:if="${message}" class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg mb-4 text-sm" th:text="${message}"></div>

        <form th:action="@{/auth/login}" method="post" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" required
                       class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-beacon-magenta focus:border-transparent outline-none transition"
                       placeholder="you@organisation.edu.au">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required
                       class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-beacon-magenta focus:border-transparent outline-none transition">
            </div>
            <button type="submit"
                    class="w-full bg-beacon-magenta text-white py-2.5 rounded-lg font-medium hover:bg-pink-800 transition-colors">
                Sign In
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-6">
            New organisation?
            <a th:href="@{/register}" class="text-beacon-magenta hover:underline">Create account</a>
        </p>
    </div>

    <p class="text-center text-xs text-gray-500 mt-6">Australian Privacy Act 1988 compliant &bull; Secure &bull; Ethical</p>
</div>
</body>
</html>
