# Production overrides
spring.jpa.show-sql=false
spring.thymeleaf.cache=true
logging.level.com.alumnibeacon=WARN

# SQLite database on persistent disk
spring.datasource.url=jdbc:sqlite:/app/data/alumnibeacon.db

# JWT cookie requires HTTPS in production
cookie.secure=true

# Logging — structured for log aggregators
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
